    <path d="M0 480 C 180 450, 300 510, 460 485 S 700 420, 860 460 S 1080 520, 1200 470"
          stroke="#ffffff" stroke-opacity="0.3" stroke-width="1.5"/>
    <path d="M0 350 C 200 330, 320 390, 500 360 S 760 290, 920 340 S 1100 390, 1200 350"
          stroke="#a78bfa" stroke-opacity="0.35" stroke-width="1.5"/>
  </g>

