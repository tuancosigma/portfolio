    <circle cx="150" cy="180" r="3" opacity="0.5"/>
    <circle cx="340" cy="120" r="2" opacity="0.35"/>
    <circle cx="520" cy="200" r="2.5" opacity="0.45"/>
    <circle cx="700" cy="140" r="2" opacity="0.3"/>
    <circle cx="880" cy="190" r="3" opacity="0.5"/>
    <circle cx="1060" cy="130" r="2" opacity="0.35"/>
    <circle cx="240" cy="580" r="2.5" opacity="0.4"/>
    <circle cx="620" cy="600" r="2" opacity="0.3"/>
    <circle cx="980" cy="580" r="2.5" opacity="0.4"/>
  </g>
  <g fill="#eca8d6">
    <circle cx="430" cy="160" r="3.5" opacity="0.7"/>
    <circle cx="790" cy="560" r="3" opacity="0.6"/>
