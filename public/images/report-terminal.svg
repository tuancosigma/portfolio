<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 675" preserveAspectRatio="xMidYMid slice">
  <defs>
    <radialGradient id="glow" cx="50%" cy="40%" r="60%">
      <stop offset="0%" stop-color="#eca8d6" stop-opacity="0.1"/>
      <stop offset="60%" stop-color="#eca8d6" stop-opacity="0.03"/>
      <stop offset="100%" stop-color="#eca8d6" stop-opacity="0"/>
    </radialGradient>
    <filter id="blur5"><feGaussianBlur stdDeviation="5"/></filter>
  </defs>

  <rect width="1200" height="675" fill="#0a0a0a"/>
  <rect width="1200" height="675" fill="url(#glow)"/>

  <!-- terminal window -->
  <g>
    <rect x="230" y="95" width="740" height="480" rx="14" fill="#101013" stroke="#ffffff" stroke-opacity="0.12" stroke-width="1.5"/>
    <!-- glow under the window -->
    <rect x="230" y="95" width="740" height="480" rx="14" fill="none" stroke="#eca8d6" stroke-opacity="0.18" stroke-width="4" filter="url(#blur5)"/>
    <!-- title bar -->
    <rect x="230" y="95" width="740" height="44" rx="14" fill="#17171b"/>
    <rect x="230" y="125" width="740" height="14" fill="#17171b"/>
    <circle cx="262" cy="117" r="6" fill="#ef4444" opacity="0.8"/>
    <circle cx="284" cy="117" r="6" fill="#fbbf24" opacity="0.8"/>
    <circle cx="306" cy="117" r="6" fill="#34d399" opacity="0.8"/>
  </g>

  <!-- log lines: bars standing in for text, severity-coloured -->
  <g rx="3">
    <!-- prompt line -->
    <rect x="270" y="172" width="14" height="10" rx="2" fill="#eca8d6"/>
    <rect x="294" y="172" width="220" height="10" rx="2" fill="#ffffff" opacity="0.35"/>
    <!-- info lines -->
    <rect x="270" y="204" width="90"  height="9" rx="2" fill="#ffffff" opacity="0.18"/>
    <rect x="372" y="204" width="380" height="9" rx="2" fill="#ffffff" opacity="0.12"/>
    <rect x="270" y="232" width="90"  height="9" rx="2" fill="#ffffff" opacity="0.18"/>
    <rect x="372" y="232" width="300" height="9" rx="2" fill="#ffffff" opacity="0.12"/>
    <!-- warning burst -->
    <rect x="270" y="260" width="90"  height="9" rx="2" fill="#fbbf24" opacity="0.5"/>
    <rect x="372" y="260" width="430" height="9" rx="2" fill="#fbbf24" opacity="0.25"/>
    <!-- alert lines (the incident) -->
    <rect x="270" y="288" width="90"  height="9" rx="2" fill="#ef4444" opacity="0.75"/>
    <rect x="372" y="288" width="470" height="9" rx="2" fill="#ef4444" opacity="0.4"/>
    <rect x="270" y="316" width="90"  height="9" rx="2" fill="#ef4444" opacity="0.75"/>
    <rect x="372" y="316" width="360" height="9" rx="2" fill="#ef4444" opacity="0.4"/>
    <rect x="270" y="344" width="90"  height="9" rx="2" fill="#ef4444" opacity="0.75"/>
    <rect x="372" y="344" width="420" height="9" rx="2" fill="#ef4444" opacity="0.4"/>
    <!-- analyst response: pink triage lines -->
    <rect x="270" y="384" width="14"  height="10" rx="2" fill="#eca8d6"/>
    <rect x="294" y="384" width="260" height="10" rx="2" fill="#eca8d6" opacity="0.6"/>
    <rect x="270" y="414" width="90"  height="9" rx="2" fill="#eca8d6" opacity="0.4"/>
    <rect x="372" y="414" width="330" height="9" rx="2" fill="#ffffff" opacity="0.15"/>
    <rect x="270" y="442" width="90"  height="9" rx="2" fill="#eca8d6" opacity="0.4"/>
    <rect x="372" y="442" width="280" height="9" rx="2" fill="#ffffff" opacity="0.15"/>
    <!-- resolution line -->
    <rect x="270" y="478" width="90"  height="9" rx="2" fill="#34d399" opacity="0.6"/>
    <rect x="372" y="478" width="240" height="9" rx="2" fill="#34d399" opacity="0.3"/>
    <!-- blinking cursor -->
    <rect x="270" y="514" width="14" height="12" rx="2" fill="#eca8d6">
      <animate attributeName="opacity" values="1;1;0;0;1" dur="1.4s" repeatCount="indefinite"/>
    </rect>
  </g>

  <!-- ambient scan line -->
  <rect x="230" y="288" width="740" height="38" fill="#ef4444" opacity="0.05"/>

  <!-- faint grid -->
  <g stroke="#ffffff" stroke-opacity="0.03">
    <path d="M0 168h1200M0 337h1200M0 506h1200"/>
    <path d="M200 0v675M400 0v675M600 0v675M800 0v675M1000 0v675"/>
  </g>
</svg>
