<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 675" preserveAspectRatio="xMidYMid slice">
  <defs>
    <radialGradient id="glow" cx="50%" cy="55%" r="55%">
      <stop offset="0%" stop-color="#eca8d6" stop-opacity="0.16"/>
      <stop offset="50%" stop-color="#eca8d6" stop-opacity="0.05"/>
      <stop offset="100%" stop-color="#eca8d6" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="cyl" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#1a1a1e"/>
      <stop offset="50%" stop-color="#2a2a30"/>
      <stop offset="100%" stop-color="#151518"/>
    </linearGradient>
    <filter id="blur4"><feGaussianBlur stdDeviation="4"/></filter>
  </defs>

  <rect width="1200" height="675" fill="#0a0a0a"/>
  <rect width="1200" height="675" fill="url(#glow)"/>

  <!-- central database cylinder stack -->
  <g>
    <!-- body -->
    <rect x="480" y="180" width="240" height="330" fill="url(#cyl)"/>
    <!-- segment seams -->
    <ellipse cx="600" cy="290" rx="120" ry="26" fill="none" stroke="#eca8d6" stroke-opacity="0.35" stroke-width="1.5"/>
    <ellipse cx="600" cy="400" rx="120" ry="26" fill="none" stroke="#eca8d6" stroke-opacity="0.35" stroke-width="1.5"/>
    <!-- bottom + top -->
    <ellipse cx="600" cy="510" rx="120" ry="26" fill="#151518" stroke="#eca8d6" stroke-opacity="0.45" stroke-width="1.5"/>
    <ellipse cx="600" cy="180" rx="120" ry="26" fill="#2e2e34" stroke="#eca8d6" stroke-opacity="0.8" stroke-width="2"/>
    <!-- side edges -->
    <path d="M480 180 V510 M720 180 V510" stroke="#eca8d6" stroke-opacity="0.45" stroke-width="1.5"/>
  </g>

  <!-- lock ring shield in front -->
  <g filter="url(#blur4)" opacity="0.9">
    <circle cx="600" cy="345" r="150" fill="none" stroke="#eca8d6" stroke-opacity="0.35" stroke-width="3" stroke-dasharray="40 18"/>
  </g>
  <circle cx="600" cy="345" r="150" fill="none" stroke="#eca8d6" stroke-opacity="0.5" stroke-width="1.5" stroke-dasharray="40 18"/>
  <!-- padlock -->
  <g transform="translate(600,345)">
    <rect x="-34" y="-6" width="68" height="52" rx="8" fill="#0a0a0a" stroke="#eca8d6" stroke-width="2.5"/>
    <path d="M-20 -6 v-14 a20 20 0 0 1 40 0 v14" fill="none" stroke="#eca8d6" stroke-width="2.5"/>
    <circle cx="0" cy="16" r="6" fill="#eca8d6"/>
    <rect x="-2.5" y="18" width="5" height="12" rx="2" fill="#eca8d6"/>
  </g>

  <!-- audit-trail dots orbiting out to the right -->
  <g fill="#eca8d6">
    <circle cx="790" cy="300" r="4" opacity="0.7"/>
    <circle cx="850" cy="330" r="3" opacity="0.5"/>
    <circle cx="910" cy="360" r="3.5" opacity="0.4"/>
    <circle cx="970" cy="390" r="2.5" opacity="0.3"/>
    <circle cx="1030" cy="415" r="2" opacity="0.2"/>
  </g>
  <path d="M760 285 C 880 320, 980 380, 1080 430" fill="none" stroke="#eca8d6" stroke-opacity="0.15" stroke-width="1.5"/>

  <!-- blocked query attempts from the left -->
  <g stroke="#ef4444" stroke-opacity="0.6" stroke-width="2.5" stroke-linecap="round">
    <path d="M170 260 L 415 315"/>
    <path d="M150 430 L 412 383"/>
  </g>
  <g stroke="#fca5a5" stroke-width="2.5" stroke-linecap="round">
    <path d="M425 305 l 20 20 M445 305 l -20 20"/>
    <path d="M422 372 l 20 20 M442 372 l -20 20"/>
  </g>

  <!-- faint grid -->
  <g stroke="#ffffff" stroke-opacity="0.03">
    <path d="M0 168h1200M0 337h1200M0 506h1200"/>
    <path d="M200 0v675M400 0v675M600 0v675M800 0v675M1000 0v675"/>
  </g>
</svg>
